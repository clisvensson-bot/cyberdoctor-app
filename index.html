<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a1a,#0d1b2a);color:#e3f2fd;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;-webkit-tap-highlight-color:transparent}
#pbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;gap:8px;padding:10px 16px;background:rgba(10,10,26,.95);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid #1a1a3a}
.pb{padding:6px 20px;border-radius:20px;border:1px solid #2a2a4a;background:transparent;color:#556;cursor:pointer;font-size:12px;letter-spacing:.05em;transition:all .2s;font-weight:500}
.pb.act{background:#1a2a4a;border-color:#3399ff;color:#7ec8fe}
#langbar{position:fixed;top:44px;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:6px 16px;background:rgba(10,10,26,.85);backdrop-filter:blur(8px);z-index:99;border-bottom:1px solid #111128}
.lb{padding:3px 14px;border-radius:14px;border:1px solid #2a2a4a;background:transparent;color:#445;cursor:pointer;font-size:11px;letter-spacing:.06em;transition:all .2s;font-weight:600}
.lb.act{background:#0f1e32;border-color:#3399ff;color:#7ec8fe}
.logo{font-size:2.2rem;font-weight:700;letter-spacing:.18em;color:#4fc3f7;margin-bottom:6px;margin-top:80px}
.tag{font-size:.8rem;color:#455a64;margin-bottom:40px;letter-spacing:.06em;text-transform:uppercase}
.wrap{position:relative;margin-bottom:30px}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(79,195,247,.15);animation:rp 3s ease-in-out infinite}
.r1{inset:-12px}.r2{inset:-24px;border-color:rgba(79,195,247,.07);animation-delay:.5s}
@keyframes rp{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}
.orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#162540,#0a0f1a);border:2px solid #1e3a5f;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .35s;position:relative;box-shadow:0 0 25px rgba(79,195,247,.08),inset 0 0 25px rgba(0,0,0,.5);user-select:none;-webkit-user-select:none}
.orb:active{transform:scale(.93)}
.orb.on{color:#4fc3f7;box-shadow:0 0 50px rgba(79,195,247,.35);animation:op 2.8s ease-in-out infinite}
.orb.sp{border-color:#81c784;box-shadow:0 0 50px rgba(129,199,132,.35);animation:op .9s ease-in-out infinite}
@keyframes op{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.icon{font-size:2.8rem}
.status{font-size:1rem;color:#78909c;margin-bottom:8px;min-height:26px;font-weight:500}
.status.on{color:#4fc3f7}.status.sp{color:#81c784}.status.er{color:#ef9a9a}
.hint{font-size:.75rem;color:#2e4057;min-height:18px;margin-bottom:16px}
.brand{margin-top:12px;font-size:.6rem;color:#1c2b38;letter-spacing:.12em;text-transform:uppercase}
</style>
</head>
<body>
<div id="pbar">
  <button class="pb" id="pb-hume" onclick="switchP('hume')">Hume EVI</button>
  <button class="pb act" id="pb-elevenlabs" onclick="switchP('elevenlabs')">ElevenLabs</button>
  <button class="pb" id="pb-retell" onclick="switchP('retell')">Retell AI</button>
</div>
<div id="langbar">
  <button class="lb" id="lb-en" onclick="switchLang('en')">EN</button>
  <button class="lb act" id="lb-pl" onclick="switchLang('pl')">PL</button>
  <button class="lb" id="lb-sv" onclick="switchLang('sv')">SV</button>
</div>
<div class="logo">CYBERDOCTOR</div>
<div class="tag" id="tagline">Holistic &amp; Quantum Medicine AI &middot; Dialadoctor.global</div>
<div class="wrap">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="orb" id="orb" onclick="go()"><span class="icon" id="ic">&#127807;</span></div>
</div>
<div class="status" id="st">Tap the orb to begin</div>
<div class="hint" id="ht">Natural remedies &middot; Herbal medicine &middot; Quantum healing</div>
<div class="brand">Dialadoctor.global &middot; <span id="pname">ElevenLabs</span></div>

<!-- Hidden audio element for ElevenLabs output -->
<audio id="spkr" playsinline autoplay style="display:none"></audio>
<audio id="silent" playsinline style="display:none"></audio>

<script>
// ──────────────────────────────────────────────────────────────

// ──────────────────────────────────────────────────────────────
var CFG = {

  },
  elevenlabs: {

  }
};

// ──────────────────────────────────────────────────────────────
// TRANSLATIONS
// ──────────────────────────────────────────────────────────────
var LANG = {
  en: {
    tagline: 'Holistic & Quantum Medicine AI \u00B7 Dialadoctor.global',
    idle: 'Tap the orb to begin',

    retellError: 'Retell-fel',
    humeError: 'Hume-fel: {code}',
    micError: 'Mikrofonfel',
    connGeneral: 'Anslutningsfel'
  }
};

var currentLang = 'pl';

function t(key, vars) {
  var str = (LANG[currentLang] && LANG[currentLang][key]) ? LANG[currentLang][key] : LANG['en'][key];
  if (vars) {
    Object.keys(vars).forEach(function(k){ str = str.replace('{'+k+'}', vars[k]); });
  }
  return str;
}

function switchLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lb').forEach(function(b){ b.classList.remove('act'); });
  document.getElementById('lb-'+lang).classList.add('act');
  document.getElementById('tagline').textContent = t('tagline');
  document.documentElement.lang = lang;
  if (!on) { ss(t('idle'), '', t('idleHint')); }
}

var prov = 'elevenlabs';
var on = false;

var orb = document.getElementById('orb');
var ic = document.getElementById('ic');
var st = document.getElementById('st');
var ht = document.getElementById('ht');
var spkr = document.getElementById('spkr');
var pname = document.getElementById('pname');

// Set initial language display (Polish default)
document.getElementById('tagline').textContent = t('tagline');
st.textContent = t('idle');
ht.textContent = t('idleHint');

// Persistent AudioContext - created once on first gesture, never closed
var gAudioCtx = null;

function getAudioCtx() {
  if (!gAudioCtx || gAudioCtx.state === 'closed') {
    gAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (gAudioCtx.state === 'suspended') { gAudioCtx.resume(); }
  return gAudioCtx;
}

function ss(m,c,h){st.textContent=m;st.className='status'+(c?' '+c:'');if(h!==undefined)ht.textContent=h;}

// ──────────────────────────────────────────────────────────────
// PROVIDER SWITCH
// ──────────────────────────────────────────────────────────────
function switchP(p){
  if(on) stop();
  prov=p;
  document.querySelectorAll('.pb').forEach(function(b){b.classList.remove('act');});
  document.getElementById('pb-'+p).classList.add('act');
  pname.textContent = p==='hume' ? 'Hume EVI' : p==='retell' ? 'Retell AI' : 'ElevenLabs';
  ss(t('idle'),'',t('idleHint'));
  orb.className='orb'; ic.textContent='\u{1F33F}';
}

function go(){on?stop():start();}

function start(){
  getAudioCtx();
  if(prov==='hume') startHume();
  else if(prov==='retell') startRetell();
  else startElevenLabs();
}

function stop(){
  on=false;
  orb.className='orb'; ic.textContent='\u{1F33F}';
  ss(t('idle'),'',t('idleHint'));
  if(prov==='hume') stopHume();
  else if(prov==='retell') stopRetell();
  else stopElevenLabs();
}

// ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
// ELEVENLABS
// ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
var elConv = null;

function startElevenLabs(){
  on = true;
  ss(t('connecting',{p:'ElevenLabs'}),'',t('waiting'));
  orb.className='orb on';
  var EL = window.client;
  if(!EL || !EL.Conversation){
    ss(t('sdkError'),'er',t('sdkHint'));
    on=false; orb.className='orb'; ic.textContent='\u{1F33F}';
    return;
  }
  EL.Conversation.startSession({
    agentId: CFG.elevenlabs.agentId,
    onConnect: function(){
      ic.textContent='\uD83C\uDF99\uFE0F'; orb.className='orb on';
      ss(t('listening'),'on',t('listeningHint'));
    },
    onDisconnect: function(){
      if(on){on=false;orb.className='orb';ic.textContent='\u{1F33F}';ss(t('idle'),'',t('idleHint'));}
      elConv=null;
    },
    onError: function(e){
      ss(t('elError'),'er',t('elHint'));
      console.error('EL error',e);
      on=false; orb.className='orb'; ic.textContent='\u{1F33F}';
    },
    onModeChange: function(m){
      if(m.mode==='speaking'){orb.className='orb sp';ss(t('speaking'),'sp');}
      else{orb.className='orb on';ss(t('listening'),'on',t('listeningHint'));}
    }
  }).then(function(c){
    elConv=c;
    if(elConv && elConv.setVolume) elConv.setVolume({volume:1.0});
  }).catch(function(e){
    ss(t('connError'),'er',t('connHint'));
    console.error(e); on=false; orb.className='orb'; ic.textContent='\u{1F33F}';
  });
}

function stopElevenLabs(){
  if(elConv){try{elConv.endSession();}catch(e){}elConv=null;}
}

// ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
// RETELL AI
// ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
var retellClient = null;

function startRetell(){
  on=true;
  ss(t('connecting',{p:'Retell AI'}),'',t('waiting'));
  orb.className='orb on';
  loadScript('https://cdn.jsdelivr.net/npm/retell-client-js-sdk@latest/dist/index.umd.js')
  .then(function(){
    var RC = window.RetellWebClient;
    if(!RC) throw new Error('Retell SDK not loaded');
    retellClient = new RC();
    retellClient.on('call_started', function(){
      ic.textContent='\uD83C\uDF99\uFE0F'; orb.className='orb on';
      ss(t('listening'),'on',t('listeningHint'));
    });
    retellClient.on('call_ended', function(){
      if(on){on=false;orb.className='orb';ic.textContent='\u{1F33F}';ss(t('idle'),'',t('idleHint'));}
    });
    retellClient.on('agent_start_talking', function(){
      orb.className='orb sp'; ss(t('speaking'),'sp');
    });
    retellClient.on('agent_stop_talking', function(){
      orb.className='orb on'; ss(t('listening'),'on',t('listeningHint'));
    });
    retellClient.on('error', function(e){
      ss(t('retellError'),'er',t('elHint'));
      console.error('Retell error',e);
      on=false; orb.className='orb'; ic.textContent='\u{1F33F}';
    });
    return fetch('https://api.retellai.com/v2/create-web-call',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+CFG.retell.apiKey},
      body:JSON.stringify({agent_id:CFG.retell.agentId})
    });
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(!d.access_token) throw new Error('No access token: '+JSON.stringify(d));
    return retellClient.startCall({accessToken:d.access_token,sampleRate:16000,captureDeviceId:'default',emitRawAudioSamples:false});
  })
  .catch(function(e){
    ss(t('connError'),'er',t('connHint'));
    console.error(e); on=false; orb.className='orb'; ic.textContent='\u{1F33F}';
  });
}

function stopRetell(){
  if(retellClient){try{retellClient.stopCall();}catch(e){}retellClient=null;}
}

// ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
// HUME EVI
// ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
var humeWs = null;
var pCtx = null;
var mStream = null;
var mProc = null;
var nextT = 0;
var audioQueue = [];
var draining = false;

function startHume(){
  on=true;
  ss(t('connecting',{p:'Hume EVI'}),'',t('waiting'));
  orb.className='orb on';
  pCtx = getAudioCtx();
  var url='wss://api.hume.ai/v0/evi/chat?api_key='+CFG.hume.apiKey+'&config_id='+CFG.hume.configId;
  humeWs=new WebSocket(url);
  humeWs.onopen=function(){
    humeWs.send(JSON.stringify({type:'session_settings',audio:{encoding:'linear16',sample_rate:16000,channels:1}}));
    startMic();
  };
  humeWs.onmessage=function(e){
    var msg=JSON.parse(e.data);
    if(msg.type==='chat_metadata'){
      ic.textContent='\uD83C\uDF99\uFE0F'; orb.className='orb on';
      ss(t('listening'),'on',t('listeningHint'));
    } else if(msg.type==='audio_output'){
      enqueueAudio(msg.data);
    } else if(msg.type==='assistant_message'){
      orb.className='orb sp'; ss(t('speaking'),'sp');
    } else if(msg.type==='user_message'){
      orb.className='orb on'; ss(t('listening'),'on');
    } else if(msg.type==='error'){
      ss(t('humeError',{code:msg.code}),'er');
      console.error('Hume',msg);
    }
  };
  humeWs.onerror=function(e){ss(t('connGeneral'),'er');console.error(e);};
  humeWs.onclose=function(){
    if(on){on=false;orb.className='orb';ic.textContent='\u{1F33F}';ss(t('idle'),'',t('idleHint'));}
  };
}

function stopHume(){
  stopMic();
  if(humeWs){try{humeWs.close();}catch(e){}humeWs=null;}
  audioQueue=[];draining=false;nextT=0;
}

function startMic(){
  if(pCtx.state==='suspended') pCtx.resume();
  navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true,autoGainControl:true}})
  .then(function(stream){
    mStream=stream;
    var src=pCtx.createMediaStreamSource(stream);
    mProc=pCtx.createScriptProcessor(4096,1,1);
    mProc.onaudioprocess=function(e){
      if(!on||!humeWs||humeWs.readyState!==1) return;
      var f=e.inputBuffer.getChannelData(0);
      var r=f.length; if(r<1) r=1;
      var b=new Int16Array(r);
      for(var i=0;i<r;i++){var s=Math.max(-1,Math.min(1,f[i]));b[i]=s<0?s*32768:s*32767;}
      var s2='';
      var u=new Uint8Array(b.buffer);
      for(var j=0;j<u.length;j++) s2+=String.fromCharCode(u[j]);
      humeWs.send(JSON.stringify({type:'audio_input',data:btoa(s2)}));
    };
    src.connect(mProc);
    mProc.connect(pCtx.destination);
  })
  .catch(function(e){ss(t('micError'),'er');console.error(e);});
}

function stopMic(){
  if(mProc){try{mProc.disconnect();}catch(e){}mProc=null;}
  if(mStream){mStream.getTracks().forEach(function(t){t.stop();});mStream=null;}
}

function enqueueAudio(b64){
  audioQueue.push(b64);
  if(!draining) drainAudio();
}

function drainAudio(){
  if(!audioQueue.length){draining=false;return;}
  draining=true;
  var b64=audioQueue.shift();
  var bin=atob(b64);
  var ab=new ArrayBuffer(bin.length);
  var view=new Uint8Array(ab);
  for(var i=0;i<bin.length;i++) view[i]=bin.charCodeAt(i);
  if(!pCtx) pCtx=getAudioCtx();
  pCtx.decodeAudioData(ab,function(buf){
    var src=pCtx.createBufferSource();
    src.buffer=buf;
    var msd=pCtx.createMediaStreamDestination();
    src.connect(msd);
    spkr.srcObject=msd.stream;
    spkr.play().catch(function(){});
    src.connect(pCtx.destination);
    var now=pCtx.currentTime;
    if(nextT<now-0.3||nextT>now+2.0) nextT=now;
    src.start(nextT);
    nextT+=buf.duration;
    src.onended=drainAudio;
  },function(){
    drainAudio();
  });
}

// ──────────────────────────────────────────────────────────────
// UTILITY
// ──────────────────────────────────────────────────────────────
function loadScript(src){
  return new Promise(function(resolve,reject){
    if(document.querySelector('script[src="'+src+'"]')){resolve();return;}
    var s=document.createElement('script');
    s.src=src;s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CYBERDOCTOR</title>
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CYBERDOCTOR">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a1a,#0d1b2a);color:#e3f2fd;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;-webkit-tap-highlight-color:transparent}
#pbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:8px 12px;background:rgba(10,10,26,.95);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid #1a1a3a}
.pb{padding:5px 14px;border-radius:20px;border:1px solid #2a2a4a;background:transparent;color:#556;cursor:pointer;font-size:11px;letter-spacing:.05em;transition:all .2s;font-weight:500}
.pb.act{background:#1a1a3a;border-color:#4fc3f7;color:#4fc3f7}
.logo{font-size:2.2rem;font-weight:700;letter-spacing:.18em;color:#4fc3f7;margin-bottom:6px;margin-top:80px}
.tag{font-size:.8rem;color:#455a64;margin-bottom:20px;letter-spacing:.06em;text-transform:uppercase}
.wrap{position:relative;margin-bottom:20px}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(79,195,247,.15);animation:rp 3s ease-in-out infinite}
.r1{inset:-12px}
.r2{inset:-24px;border-color:rgba(79,195,247,.07);animation-delay:.5s}
@keyframes rp{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}
.orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#162540,#0a0f1a);border:2px solid #1e3a5f;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .35s;position:relative;box-shadow:0 0 25px rgba(79,195,247,.08),inset 0 0 25px rgba(0,0,0,.5);user-select:none;-webkit-user-select:none}
.orb.on{border-color:#4fc3f7;box-shadow:0 0 50px rgba(79,195,247,.35);animation:op 2.8s ease-in-out infinite}
.orb.sp{border-color:#81c784;box-shadow:0 0 50px rgba(129,199,132,.35);animation:op .9s ease-in-out infinite}
.orb.stopping{border-color:#ef9a9a;box-shadow:0 0 30px rgba(239,154,154,.25);animation:none}
.orb.er{border-color:#ef9a9a}
@keyframes op{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.icon{font-size:2.8rem}
.status{font-size:1rem;color:#78909c;margin-bottom:8px;min-height:26px;font-weight:500}
.status.on{color:#4fc3f7}
.status.sp{color:#81c784}
.status.er{color:#ef9a9a}
.hint{font-size:.75rem;color:#2e4057;min-height:18px;margin-bottom:8px}
.brand{margin-top:8px;font-size:.6rem;color:#1c2b38;letter-spacing:.12em;text-transform:uppercase}
#dbg{font-size:.65rem;color:#ef9a9a;background:rgba(239,154,154,.08);border:1px solid rgba(239,154,154,.2);border-radius:8px;padding:8px 12px;margin-top:10px;max-width:340px;word-break:break-all;min-height:20px;text-align:left;display:block}
@media(max-width:500px){.logo{font-size:2rem;margin-top:60px}.orb{width:120px;height:120px}.pb{font-size:10px;padding:4px 10py}}
</style>
</head>
<body>
<div id="pbar">
<button id="bp-el" class="pb" onclick="setP('elevenlabs')">ElevenLabs</button>
<button id="bp-hume" class="pb" onclick="setP('hume')">Hume AI</button>
<button id="bp-re" class="pb" onclick="setP('retell')">Retell AI</button>
<button id="bp-en" class="pb" onclick="setL('en')">EN</button>
<button id="bp-pl" class="pb" onclick="setL('pl')">PL</button>
<button id="bp-sv" class="pb" onclick="setL('sv')">SV</button>
</div>
<div class="logo">CYBERDOCTOR</div>
<div class="tag" id="tagline">v23</div>
<div class="wrap">
<div class="ring r1"></div>
<div class="ring r2"></div>
<div id="orb" class="orb" onclick="go()"><div class="icon" id="ic">&#x1F33F;</div></div>
</div>
<div id="status" class="status"></div>
<div id="hint" class="hint"></div>
<div id="dbg">Loading SDK...</div>
  <div class="brand">by CLI</div>

<script>
var pCtx=null,on=false,lang='pl',prov='elevenlabs',stopping=false,stopCooldown=false;
var elConv=null;
window.EL=null;
var EL_API_KEY='a8e01c062eb7a5004b13f9c5039675aa205b5d3c15a071ee59b4ee23b46a3986';

var AGENTS={
  elevenlabs:{
    en:'agent_4801kksye0h7fwer3stvz64jg64c',
    pl:'agent_3401kkynw95qfvh9vjt0k1nk71xm',
    sv:'agent_0101kkyywztkehtbntx2a43b7bna'
  }
};

// Auto-patch all 3 agents to set turn_timeout=30 seconds
function patchAgents(){
  var ids=[AGENTS.elevenlabs.en,AGENTS.elevenlabs.pl,AGENTS.elevenlabs.sv];
  ids.forEach(function(aid){
    fetch('https://api.elevenlabs.io/v1/convai/agents/'+aid,{
      method:'PATCH',
      headers:{'xi-api-key':EL_API_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({conversation_config:{turn:{mode:'turn',turn_timeout:30}}})
    }).then(function(r){return r.json();}).then(function(d){
      window.dbgLog('patched:'+aid.slice(-8)+' ok='+(d.agent_id?'Y':'N err='+JSON.stringify(d).slice(0,60)));
    }).catch(function(e){window.dbgLog('patch err:'+e);});
  });
}

var I18N={
  en:{idle:'Tap to talk to your doctor',idleHint:'AI health assistant ready',loading:'Loading...',listening:'Listening...',listeningHint:'Speak freely about your health',speaking:'Speaking...',er:'Error - tap to retry'},
  pl:{idle:'Dotknij»by porozmawiaÄ‡ z lekarzem',idleHint:'Asystent zdrowia AI gotowy',loading:'Ladowanie...',listening:'SĹ‚ucham...',listeningHint:'MĂłw swobodnie o swoim zdrowiu',speaking:'MĂłwiÄ™...',er:'BÄ…d - dotknij», sprĂłbowaÄ‡ ponownie'},
  sv:{idle:'Tryck fĂ¶r att prata med din lĂ¤kare',idleHint:'AI hĂ¤lsoassistent redo',loading:'Laddar...',listening:'Lyssnar...',listeningHint:'Tala fritt om din hĂ¤lsa',speaking:'Talar...',er:'Fel - tryck fĂ¶r att fĂ¶rsĂ¶ka igen'}
};

window.dbgLog=function(m){var e=document.getElementById('dbg');if(e)e.innerHTML=e.innerHTML+(e.innerHTML?'<br>':'')+m;};
window.t=function(k){return(I18N[lang]||I18N.en)[k]||k;};
window.ss=function(s,cls,h){
  var st=document.getElementById('status'),st=document.getElementById('status'),orb=document.getElementById('orb'),hi=document.getElementById('hint');
  st.className='status'+(cls?' '+cls:'');st.innerHTML=s;
  orb.className='orb'+(cls?' '+cls:'');
  hi.innerHTML=h||'';
};
window.updateBar=function(){
  ['el','hume','re'].forEach(function(x){document.getElementById('bp-'+x).classList.remove('act');});
  ['en','pl','sv'].forEach(function(x){document.getElementById('bp-'+x).classList.remove('act');});
  var pm={'elevenlabs':'el','hume':'hume','retell':'re'};
  if(pm[prov])document.getElementById('bp-'+pm[prov]).classList.add('act');
  document.getElementById('bp-'+lang).classList.add('act');
};

function getACtx(){if(!pCtx){pCtx=new(window.AudioContext||window.webkitAudioContext)();}if(pCtx.state==='suspended')pCtx.resume();return pCtx;}
function setP(p){if(on)stop();prov=p;updateBar();}
function setL(l){if(on)stop();lang=l;updateBar();ss(t('idle'),'',t('idleHint'));}

function go(){
  if(stopping||stopCooldown){window.dbgLog('BLOCKED');return;}
  if(on){stop();}else{start();}
}

function start(){
  if(stopping||stopCooldown)return;
  getACtx();
  on=true;
  ss(t('listening'),'on',t('listeningHint'));
  document.getElementById('ic').textContent='\uD83C\uDF99\uFE0F';
  if(prov==='hume')startHume();
  else if(prov==='retell')startRetell();
  else startEL();
}

function stop(){
  if(stopping)return;
  stopping=true;on=false;
  document.getElementById('ic').textContent='\u{1F33F}';
  ss(t('idle'),'stopping',t('idleHint'));
  stopEL();
  setTimeout(function(){
    stopping=false;stopCooldown=true;
    ss(t('idle'),'',t('idleHint'));
    setTimeout(function(){stopCooldown=false;},1500);
  },800);
}

function startEL(){
  if(!window.EL){window.dbgLog('SDK not ready');on=false;sst('er'),'er');return;}
  var aid=AGENTS.elevenlabs[lang]||AGENTS.elevenlabs.en;
  window.dbgLog('startEL lang='+lang+' agent='+aĄd);
  navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(tmpStream){
    window.dbgLog('Mic granted. Starting session...');
    window.EL.startSession({
      agentId: aid,
      inputAudioStream: tmpStream,
      onConnect: function(){
        window.dbgLog('CONNECTED');
        if(!on||stopping)return;
        ss(t('listening'),'on',t('listeningHint'));
        document.getElementById('ic').textContent='\uD83C\uDF99\uFE0F';
      },
      onDisconnect: function(){
        window.dbgLog('DISCONNECTED');
        try{tmpStream.getTracks().forEach(function(tr){tr.stop();});}catch(e){}
        elConv=null;
        if(!stopping){on=false;document.getElementById('ic').textContent='\u{1F33F}';ss(t('idle'),'',t('idleHint'));}
      },
      onModeChange: function(m){
        window.dbgLog('mode:'+m.mode);
        if(!on||stopping)return;
        if(m.mode==='speaking'){ss(t('speaking'),'sp');document.getElementById('ic').textContent='\uD83C\uDF99\uFE0F';}
        else{ss(t('listening'),'on',t('listeningHint'));}
      },
      onError: function(e){
        var msg=e?JSON.stringify(e):'?';
        window.dbgLog('onError:'+msg);
        if(msg.indexOf('error_type')>=0){return;}
        ss(t('er'),'er');
      }
    }).then(function(conv){elConv=conv;window.dbgLog('session OK');})
    .catch(function(err){
      window.dbgLog('session FAILED:'+(err?err.toString():'?'));
      try{tmpStream.getTracks().forEach(function(tr){tr.stop();});}catch(e){}
      on=false;sst('er'),'er');
    });
  }).catch(function(err){
    window.dbgLog('Mic DENIED:'+err);
    on=false;sst('er'),'er');
  });
}

function stopEL(){
  var c=elConv;elConv=null;
  if(c){try{c.endSession();}catch(e){}
    setTimeout(function(){try{if(c._ws)c._ws.close();}catch(e){}try{if(c._pc)c._pc.close();}catch(e){}},200);}
}

function startRetell(){window.dbgLog('Retell: not configured');}
function stopRetell(){}

function startHume(){
  getACtx();
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    window.dbgLog('Hume mic OK');
    var ws=new WebSocket('wss://api.hume.ai/v0/evi/chat?api_key=HVq3u5nqTg5eK2sL4mN7pR0vW8xY1zA9bC6dE2fG3hI4jK5lM7nO8pQ9rS0tU1vW2xY3zA4bC5dE6fG7hI4jK9lM0nP1qR2sT3uV4wX5yZ6&config_id=fdd212af-9c46-4396-806e-dac64d005682');
    var nT=0;
    ws.onopen=function(){ss(t('listening'),'on');};
    ws.onmessage=function(e){
      try{var ab=new Uint8Array(e.data);pCtx.decodeAudioData(ab.buffer,function(buf){var src=pCtx.createBufferSource();src.buffer=buf;src.connect(pCtx.destination);var now=pCtx.currentTime;if(nT<now-0.3||nT>now+2.0)nT=now+0.4;src.start(nT);nT+=buf.duration;});}catch(ex){}
    };
    ws.onerror=function(){ss(t('er'),'er');};
  }).catch(function(err){window.dbgLog('Hume mic ERROR:'+err);});
}
function stopHume(){}

window.addEventListener('unhandledrejection',function(e){
  try{var r=e.reason,m=r?(r.message||String(r)):'';if(m.indexOf('error_type')>=0){e.preventDefault();return;}}catch(x){}
},true);

updateBar();
ss(t('idle'),'',t('idleHint'));
</script>

<script type="module">
import { Conversation } from 'https://cdn.jsdelivr.net/npm/@elevenlabs/client@0.15.1/+esm';
window.EL = Conversation;
window.dbgLog('SDK loaded OK');
patchAgents();
</script>

</body>
</html>

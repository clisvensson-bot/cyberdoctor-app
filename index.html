<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CYBERDOCTOR</title>
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CYBERDOCTOR">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a1a,#0d1b2a);color:#e3f2fd;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;-webkit-tap-highlight-color:transparent}
.logo{font-size:2.2rem;font-weight:700;letter-spacing:.18em;color:#4fc3f7;margin-bottom:6px}
.tag{font-size:.8rem;color:#455a64;margin-bottom:40px;letter-spacing:.06em;text-transform:uppercase}
.wrap{position:relative;margin-bottom:30px}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(79,195,247,.15);animation:rp 3s ease-in-out infinite}
.r1{inset:-12px}.r2{inset:-24px;border-color:rgba(79,195,247,.07);animation-delay:.5s}
@keyframes rp{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}
.orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#162540,#0a0f1a);border:2px solid #1e3a5f;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .35s;position:relative;box-shadow:0 0 25px rgba(79,195,247,.08),inset 0 0 25px rgba(0,0,0,.5);user-select:none;-webkit-user-select:none}
.orb:active{transform:scale(.93)}
.orb.on{border-color:#4fc3f7;box-shadow:0 0 50px rgba(79,195,247,.35);animation:op 1.8s ease-in-out infinite}
.orb.sp{border-color:#81c784;box-shadow:0 0 50px rgba(129,199,132,.35);animation:op .9s ease-in-out infinite}
@keyframes op{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.icon{font-size:2.8rem}
.status{font-size:1rem;color:#78909c;margin-bottom:8px;min-height:26px;font-weight:500}
.status.on{color:#4fc3f7}.status.sp{color:#81c784}.status.er{color:#ef9a9a}
.hint{font-size:.75rem;color:#2e4057;min-height:18px;margin-bottom:16px}
.brand{margin-top:12px;font-size:.6rem;color:#1c2b38;letter-spacing:.12em;text-transform:uppercase}
</style>
</head>
<body>
<div class="logo">CYBERDOCTOR</div>
<div class="tag">Holistic &amp; Quantum Medicine AI &middot; Dialadoctor.global</div>
<div class="wrap">
<div class="ring r1"></div>
<div class="ring r2"></div>
<div class="orb" id="orb" onclick="go()"><span class="icon" id="ic">&#127807;</span></div>
</div>
<div class="status" id="st">Tap the orb to begin</div>
<div class="hint" id="ht">Natural remedies &middot; Herbal medicine &middot; Quantum healing</div>
<div class="brand">Dialadoctor.global &middot; Hume EVI</div>
<script>
var C="fdd212af-9c46-4396-806e-dac64d005682",K="PlTB4AADM5ISBlH8NG1a4NayxFLBHUBoMLxImRzG3g9AAV9d";
var sock,stream,actx,proc;
var on=false,playCtx=null,nextTime=0;
var orb=document.getElementById("orb"),ic=document.getElementById("ic"),st=document.getElementById("st"),ht=document.getElementById("ht");

function ss(m,c,h){st.textContent=m;st.className="status"+(c?" "+c:"");if(h!==undefined)ht.textContent=h;}

function go(){on?stop():connect();}

function connect(){
  ss("Connecting...","","Please wait...");
  try{
    sock=new WebSocket("wss://api.hume.ai/v0/evi/chat?config_id="+C+"&api_key="+K);
    sock.onopen=function(){
      on=true;
      orb.className="orb on";ic.textContent="\uD83C\uDF99\uFE0F";
      ss("Listening - speak freely","on","Ask about herbs, remedies, quantum healing");
      startMic();
    };
    sock.onmessage=function(e){
      try{
        var m=JSON.parse(e.data);
        if(m.type==="audio_output"&&m.data){
          orb.className="orb sp";ic.textContent="\uD83D\uDC04";
          ss("Speaking...","sp","");
          playPCM(m.data);
        }
        if(m.type==="user_message"){orb.className="orb on";ic.textContent="\uD83C\uDF99\uFE0F";ss("Listening...","on","");}
        if(m.type==="assistant_end_utterance"){orb.className="orb on";ic.textContent="\uD83C\uDF99\uFE0F";ss("Listening - speak freely","on","Ask about herbs, remedies, quantum healing");}
        if(m.type==="error"){ss("Error - tap to retry","er","");stop();}
      }catch(x){}
    };
    sock.onerror=function(){ss("Connection error - tap to retry","er","");stop();};
    sock.onclose=function(e){if(on)stop();};
  }catch(e){ss("Error: "+e.message,"er","Tap to retry");}
}

function startMic(){
  navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true,autoGainControl:true}}).then(function(s){
    stream=s;
    // Recording AudioContext at 16kHz
    try{actx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});}
    catch(ex){actx=new(window.AudioContext||window.webkitAudioContext)();}
    try{actx.resume();}catch(ex){}

    // Playback AudioContext (separate, at system rate)
    if(!playCtx||playCtx.state==="closed"){
      playCtx=new(window.AudioContext||window.webkitAudioContext)();
      try{playCtx.resume();}catch(ex){}
      nextTime=0;
    }

    var src=actx.createMediaStreamSource(s);
    proc=actx.createScriptProcessor(4096,1,1);
    var ratio=Math.round(actx.sampleRate/16000);
    if(ratio<1)ratio=1;

    proc.onaudioprocess=function(e){
      if(!sock||sock.readyState!==1)return;
      var d=e.inputBuffer.getChannelData(0);
      var p;
      if(ratio===1){
        p=new Int16Array(d.length);
        for(var i=0;i<d.length;i++)p[i]=Math.max(-32768,Math.min(32767,d[i]*32767));
      }else{
        var out=[];
        for(var i=0;i<d.length;i+=ratio)out.push(d[i]);
        p=new Int16Array(out.length);
        for(var i=0;i<out.length;i++)p[i]=Math.max(-32768,Math.min(32767,out[i]*32767));
      }
      var b=new Uint8Array(p.buffer),s2="";
      for(var j=0;j<b.byteLength;j++)s2+=String.fromCharCode(b[j]);
      sock.send(JSON.stringify({type:"audio_input",data:btoa(s2)}));
    };
    src.connect(proc);proc.connect(actx.destination);
  }).catch(function(err){
    ss("Microphone needed","er","Allow microphone in browser settings");
  });
}

// Play raw PCM16 audio from Hume (base64 encoded, 16kHz mono)
function playPCM(b64){
  try{
    if(!playCtx||playCtx.state==="closed"){
      playCtx=new(window.AudioContext||window.webkitAudioContext)();
      nextTime=0;
    }
    try{playCtx.resume();}catch(ex){}

    // Decode base64 to bytes
    var raw=atob(b64);
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);

    // Interpret as 16-bit signed PCM (little-endian)
    var int16=new Int16Array(bytes.buffer);

    // Convert to float32 for Web Audio API
    var float32=new Float32Array(int16.length);
    for(var i=0;i<int16.length;i++){
      float32[i]=int16[i]/(int16[i]<0?32768:32767);
    }

    // Hume EVI sends 16kHz PCM
    var sampleRate=16000;
    var buf=playCtx.createBuffer(1,float32.length,sampleRate);
    buf.copyToChannel(float32,0);

    var node=playCtx.createBufferSource();
    node.buffer=buf;
    node.connect(playCtx.destination);

    var now=playCtx.currentTime;
    var start=Math.max(now,nextTime);
    node.start(start);
    nextTime=start+buf.duration;
    node.onended=function(){
      setTimeout(function(){
        if(nextTime<=playCtx.currentTime+0.05){
          orb.className="orb on";ic.textContent="\uD83C\uDF99\uFE0F";
          ss("Listening - speak freely","on","Ask about herbs, remedies, quantum healing");
        }
      },100);
    };
  }catch(e){}
}

function stop(){
  on=false;
  orb.className="orb";ic.textContent="\uD83C\uDF3F";
  ss("Tap the orb to begin","","Natural remedies \u00B7 Herbal medicine \u00B7 Quantum healing");
  if(proc){try{proc.disconnect();}catch(e){}proc=null;}
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  if(actx){try{actx.close();}catch(e){}actx=null;}
  if(sock){try{sock.close();}catch(e){}sock=null;}
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>CYBERDOCTOR</title>
  <meta name="theme-color" content="#0a0a1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CYBERDOCTOR">
  <script src="https://unpkg.com/@elevenlabs/client@0.15.1/dist/lib.umd.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:linear-gradient(135deg,#0a0a1a,#0d1b2a);color:#e3f2fd;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;-webkit-tap-highlight-color:transparent}
    #pbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;gap:8px;padding:10px 16px;background:rgba(10,10,26,.95);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid #1a1a3a}
    .pb{padding:6px 20px;border-radius:20px;border:1px solid #2a2a4a;background:transparent;color:#556;cursor:pointer;font-size:12px;letter-spacing:.05em;transition:all .2s;font-weight:500}
    .pb.act{background:#1a1a3a;border-color:#2a2a4a;color:#4fc3f7}
    #menu{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,26,.85);backdrop-filter:blur(8px);z-index:99;border-bottom:1px solid #1a1a3a}
    #close{padding:6px 16px;background:rgba(10,10,26,.85);backdrop-filter:blur(8px);z-index:99;border-bottom:1px solid #1a1a3a;cursor:pointer;font-size:11px;letter-spacing:.06em;transition:all .2s;font-weight:600}
    .logo{font-size:2.2rem;font-weight:700;letter-spacing:.18em;color:#4fc3f7;margin-bottom:6px;margin-top:80px}
    .tag{font-size:.8rem;color:#455a64;margin-bottom:40px;letter-spacing:.06em;text-transform:uppercase}
    .wrap{position:relative;margin-bottom:30px}
    .ring{position:absolute;border-radius:50%;border:1px solid rgba(79,195,247,.15);animation:rp 3s ease-in-out infinite}
    .r1{inset:-12px}
    .r2{inset:-24px;border-color:rgba(79,195,247,.07);animation-delay:.5s}
    @keyframes rp{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}
    .orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#162540,#0a0f1a);border:2px solid #1e3a5f;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .35s;position:relative;box-shadow:0 0 25px rgba(79,195,247,.08),inset 0 0 25px rgba(0,0,0,.5);user-select:none;-webkit-user-select:none}
    .orb.active{transform:scale(.93)}
    .orb.on{color:#4fc3f7;box-shadow:0 0 50px rgba(79,195,247,.35);animation:op 2.8s ease-in-out infinite}
    .orb.sp{border-color:#81c784;box-shadow:0 0 50px rgba(129,199,132,.35);animation:op .9s ease-in-out infinite}
    .orb.stopping{border-color:#ef9a9a;box-shadow:0 0 30px rgba(239,154,154,.25);animation:none}
    @keyframes op{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    .icon{font-size:2.8rem}
  .status{font-size:1rem;color:#78909c;margin-bottom:8px;min-height:26px;font-weight:500}
    .status.on{color:#4fc3f7}
    .status.sp{color:#81c784}
    .status.er{color:#ef9a9a}
    .hint{font-size:.75rem;color:#2e4057;min-height:18px;margin-bottom:16px}
    .brand{margin-top:12px;font-size:.6rem;color:#1c2b38;letter-spacing:.12em;text-transform:uppercase}
    @media (max-width:500px){.logo{font-size:2rem;margin-top:60px}.orb{width:120px;height:120px}.pb{font-size:11px;padding:4px 16px}}
    </style>
  </head><body>
    <div id=pbar>
      <button id=prov onclick=provMenu() class=pb>ElevenLabs</button>button>
      <button id=lang onclick=langMenu() class=pb>EN</button>button>
      <button id=close style=display:none onclick=closeMenu()>Close</button>button>
    </div>div>
    <div id=menu>
      <div class=logo>CYBERDOCTOR</div>div>
      <div class=tag>v11</div>div>
      <div class=wrap>
        <div class=ring r1></div>div><div class=ring r2></div>div>
        <div id=orb class=orb onclick=go()><div class=icon id=ic>&#x1F33F;</div>div></div>div>
      </div>div>
      <div id=status class=status></div>div>
      <div id=hint class=hint></div>div>
      <div class=brand>by CLI</div>div>
    </div>div>
    <script>
      var pCtx = null;
      var nextT = 0;
      var on = false;
      var lang = 'en';
      var prov = 'elevenlabs';
      var elConv = null;
      var stopping = false;
      var stopCooldown = false;
      function ss(s1,s2,h='') { document.getElementById('status').innerHTML=s1; document.getElementById('orb').className='orb'+(s2||''); document.getElementById('hint').innerHTML=h; }
      function t(k) { return {idle:'Tap the orb to talk',idleHint:'Your AI doctor is ready',listening:'Listening...',listeningHint:'Say anything about your health',speaking:'Speaking...',er:'Error'}[k]; }
      function getAudioCtx() { if (!pCtx) { pCtx = new (window.AudioContext||window.webkitAudioContext)(); nextT = pCtx.currentTime; } }
      function provMenu() { document.getElementById('menu').style.display='block'; document.getElementById('prov').innerHTML=prov==='hume'?'Hume AI':'Retell AI'==='retell'?prov:'ElevenLabs'; document.getElementById('close').style.display='block'; }
      function langMenu() { document.getElementById('menu').style.display='block'; document.getElementById('lang').innerHTML=lang==='en'?'EN':'SV'; document.getElementById('close').style.display='block'; }
      function closeMenu() { document.getElementById('menu').style.display='none'; document.getElementById('close').style.display='none'; }
      function go() {
          if (stopping || stopCooldown) return;
          on ? stop() : start();
      }
      function start() {
          if (stopping || stopCooldown) return;
          getAudioCtx();
          if (prov === 'hume') startHume();
          else if (prov === 'retell') startRetell();
          else startElevenLabs();
      }
      function stop() {
          if (stopping) return;
          stopping = true;
          on = false;
          orb.className = 'orb';
          ic.textContent = '\u{1F33F}';
          ss(t('idle'), '', t('idleHint'));
          if (prov === 'hume') stopHume();
          else if (prov === 'retell') stopRetell();
          else stopElevenLabs();
          setTimeout(function() {
                stopping = false;
                stopCooldown = true;
          setTimeout(function() { stopCooldown = false; }, 1500);
          }, 800);
      }
      function startElevenLabs() {
        elConv = new ElevenLabs.Conversation({
              apiKey: 'sk-9bef95d2836949a3a9d5f4e7cbba2f9d4e3a',
              voiceId: lang==='sv' ? 'pNInz6obpgDQGcFmaJgB' : 'EXAVITQu4vr4xnSDxMaL',
              modelId: 'eleven_turbo_v2_5',
              firstMessage: {type: 'url', url: 'https://cyberdoctor.app/intro-'+lang+'.mp3'},
              onConnect: function() {
                      if (stopping || !on) return;
                      ic.textContent = '\uD83C\uDF99\uFE0F';
                      orb.className = 'orb on';
                      ss(t('listening'), 'on', t('listeningHint'));
              },
              onDisconnect: function() {
                      if (!stopping) {
                                on = false; orb.className = 'orb'; ic.textContent = '\u{1F33F}'; ss(t('idle'), '', t('idleHint'));
                      }
                      elConv = null;
              },
              onModeChange: function(m) {
                      if (stopping || !on) return;
                      if (m.mode === 'speaking') { orb.className = 'orb sp'; ss(t('speaking'), 'sp'); }
                      else { orb.className = 'orb on'; ss(t('listening'), 'on', t('listeningHint')); }
              },
              onError: function() { orb.className = 'orb er'; ss(t('er'), 'er'); }
        });
      }
      function stopElevenLabs() {
          var conv = elConv;
          elConv = null;
          if (conv) {
                try { conv.endSession(); } catch(e) {}
                setTimeout(function() {
                        try {
                                  if (conv._ws) { try { conv._ws.close(); } catch(e) {} }
                                  if (conv._pc) { try { conv._pc.close(); } catch(e) {} }
                                  if (conv._pc && conv._pc.getSenders) {
                                              conv._pc.getSenders().forEach(function(s) {
                                                            try { if (s.track) s.track.stop(); } catch(e) {}
                                              });
                                  }
                        } catch(e) {}
                }, 100);
          }
      }
      function startRetell() {
          // Retell implementation placeholder
      }
      function stopRetell() {
          // Retell stop
      }
      function startHume() {
          getAudioCtx();
          navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream) {
                var src = pCtx.createMediaStreamSource(stream);
                var ws = new WebSocket('wss://api.hume.ai/v0/converse/prepare?auth-key=HVq3u5nqTg5eK2sL4mN7pR0vW8xY1zA9bC6dE2fG3hI4jK5lM7nO8pQ9rS0tU1vW2xY3zA4bC5dE6fG7hI8jK9lM0nP1qR2sT3uV4wX5yZ6');
                ws.onopen = function() { ic.textContent = '\uD83C\uDF99\uFE0F'; orb.className = 'orb on'; ss(t('listening'), 'on'); };
                ws.onmessage = function(e) {
                        var ab = new Uint8Array(e.data);
                        pCtx.decodeAudioData(ab, function(buf) {
                                  var src = pCtx.createBufferSource();
                                  src.buffer = buf;
                                  var now = pCtx.currentTime;
                                  if (nextT < now - 0.3 || nextT > now + 2.0) nextT = now + 0.4;
                                  src.start(nextT);
                                  nextT += buf.duration;
                        });
                };
                ws.onerror = function() { ss(t('er'), 'er'); };
          });
      }
      function stopHume() {
          // Hume stop
      }
      var orb = document.getElementById('orb');
      var ic = document.getElementById('ic');
      ss(t('idle'), '', t('idleHint'));
      document.getElementById('prov').onclick = function() {
          prov = prov==='elevenlabs' ? 'hume' : prov==='hume' ? 'retell' : 'elevenlabs';
          this.innerHTML = prov==='hume'?'Hume AI':prov==='retell'?'Retell AI':'ElevenLabs';
      };
      document.getElementById('lang').onclick = function() {
          lang = lang==='en' ? 'sv' : 'en';
          this.innerHTML = lang==='en'?'EN':'SV';
      };
    </script>
  </body></html>html>
    </script>
  </body>

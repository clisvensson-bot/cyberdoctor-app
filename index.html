<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERDOCTOR</title>
  <meta name="theme-color" content="#0a0a1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  </head>
<body style="margin:0;background:#0a0a1a;color:#e3f2fd;font-family:sans-serif;display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;">
<h1 style="color:#4fc3f7;font-size:2rem;letter-spacing:0.2em;">CYBERDOCTOR</h1>
<p style="color:#546e7a;">Loading voice AI...</p>
<script>
  const CONFIG_ID = "1a4efd76-4e79-41dc-9c34-46ca454ea302";
  const API_KEY = "PlTB4AADM5ISBlH8NG1a4NayxFLBHUBoMLxImRzG3g9AAV9d";
  let socket, mediaStream, audioContext, recorder, isConnected = false;
  let audioQueue = [], isPlaying = false;

  function setStatus(msg) {
      document.querySelector('p').textContent = msg;
  }

  async function connect() {
      try {
            const res = await fetch("https://api.hume.ai/v0/evi/chat?config_id=" + CONFIG_ID, {
                    method: "GET",
                    headers: { "X-Hume-Api-Key": API_KEY }
            });
            const data = await res.json();
            const wsUrl = "wss://api.hume.ai/v0/evi/chat?config_id=" + CONFIG_ID + "&api_key=" + API_KEY;
            socket = new WebSocket(wsUrl);
            socket.onopen = async () => {
                    isConnected = true;
                    setStatus("Connected - speak now");
                    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new AudioContext({ sampleRate: 16000 });
                    const source = audioContext.createMediaStreamSource(mediaStream);
                    const processor = audioContext.createScriptProcessor(4096, 1, 1);
                    processor.onaudioprocess = (e) => {
                              if (socket && socket.readyState === 1) {
                                          const buf = e.inputBuffer.getChannelData(0);
                                          const pcm = new Int16Array(buf.length);
                                          for (let i = 0; i < buf.length; i++) pcm[i] = Math.max(-32768, Math.min(32767, buf[i] * 32768));
                                const b64 = btoa(String.fromCharCode(...new Uint8Array(pcm.buffer)));
                                          socket.send(JSON.stringify({ type: "audio_input", data: b64 }));
                              }
                    };
        source.connect(processor);
                    processor.connect(audioContext.destination);
                    recorder = processor;
            };
            socket.onmessage = async (e) => {
                    try {
                              const msg = JSON.parse(e.data);
                              if (msg.type === "audio_output" && msg.data) {
                                          audioQueue.push(msg.data);
                                          if (!isPlaying) playNext();
                              }
                    } catch(err) {}
            };
            socket.onerror = () => { setStatus("Connection error"); disconnect(); };
            socket.onclose = () => { if (isConnected) { isConnected = false; setStatus("Tap to start"); } };
      } catch(e) {
            setStatus("Error: " + e.message);
      }
                                            }

                                                                         async function playNext() {
                                                                             if (!audioQueue.length) { isPlaying = false; return; }
                                                                             isPlaying = true;
                                                                             const b64 = audioQueue.shift();
                                                                             const bytes = atob(b64);
                                                                             const buf = new ArrayBuffer(bytes.length);
                                                                             const view = new Uint8Array(buf);
                                                                             for (let i = 0; i < bytes.length; i++) view[i] = bytes.charCodeAt(i);
                                                                             const decoded = await (new AudioContext()).decodeAudioData(buf);
                                                                             const ctx = new AudioContext();
                                                                             const src = ctx.createBufferSource();
                                                                             src.buffer = decoded;
                                                                             src.connect(ctx.destination);
                                                                             src.onended = playNext;
                                                                             src.start();
                                                                         }

  function disconnect() {
      isConnected = false;
      if (recorder) { recorder.disconnect(); recorder = null; }
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      if (socket) { socket.close(); socket = null; }
      setStatus("Tap to start");
  }

  document.body.addEventListener("click", () => {
      if (isConnected) disconnect();
      else connect();
  });

  setStatus("Tap anywhere to start CYBERDOCTOR");
</script>
</body>
</html>

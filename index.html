<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CYBERDOCTOR</title>
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CYBERDOCTOR">
<script src="https://unpkg.com/@elevenlabs/client@0.15.1/dist/lib.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a1a,#0d1b2a);color:#e3f2fd;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;-webkit-tap-highlight-color:transparent}
#pbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:8px 12px;background:rgba(10,10,26,.95);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid #1a1a3a}
.pb{padding:5px 14px;border-radius:20px;border:1px solid #2a2a4a;background:transparent;color:#556;cursor:pointer;font-size:11px;letter-spacing:.05em;transition:all .2s;font-weight:500}
.pb.act{background:#1a1a3a;border-color:#4fc3f7;color:#4fc3f7}
.logo{font-size:2.2rem;font-weight:700;letter-spacing:.18em;color:#4fc3f7;margin-bottom:6px;margin-top:80px}
.tag{font-size:.8rem;color:#455a64;margin-bottom:40px;letter-spacing:.06em;text-transform:uppercase}
.wrap{position:relative;margin-bottom:30px}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(79,195,247,.15);animation:rp 3s ease-in-out infinite}
.r1{inset:-12px}
.r2{inset:-24px;border-color:rgba(79,195,247,.07);animation-delay:.5s}
@keyframes rp{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}
.orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#162540,#0a0f1a);border:2px solid #1e3a5f;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .35s;position:relative;box-shadow:0 0 25px rgba(79,195,247,.08),inset 0 0 25px rgba(0,0,0,.5);user-select:none;-webkit-user-select:none}
.orb.active{transform:scale(.93)}
.orb.on{color:#4fc3f7;box-shadow:0 0 50px rgba(79,195,247,.35);animation:op 2.8s ease-in-out infinite}
.orb.sp{border-color:#81c784;box-shadow:0 0 50px rgba(129,199,132,.35);animation:op .9s ease-in-out infinite}
.orb.stopping{border-color:#ef9a9a;box-shadow:0 0 30px rgba(239,154,154,.25);animation:none}
@keyframes op{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.icon{font-size:2.8rem}
.status{font-size:1rem;color:#78909c;margin-bottom:8px;min-height:26px;font-weight:500}
.status.on{color:#4fc3f7}
.status.sp{color:#81c784}
.status.er{color:#ef9a9a}
.hint{font-size:.75rem;color:#2e4057;min-height:18px;margin-bottom:16px}
.brand{margin-top:12px;font-size:.6rem;color:#1c2b38;letter-spacing:.12em;text-transform:uppercase}
@media(max-width:500px){.logo{font-size:2rem;margin-top:60px}.orb{width:120px;height:120px}.pb{font-size:10px;padding:4px 10px}}
</style>
</head>
<body>
<div id=pbar>
<button id=bp-el class=pb onclick=setP('elevenlabs')>ElevenLabs</button>
<button id=bp-hume class=pb onclick=setP('hume')>Hume AI</button>
<button id=bp-re class=pb onclick=setP('retell')>Retell AI</button>
<button id=bp-en class=pb onclick=setL('en')>EN</button>
<button id=bp-pl class=pb onclick=setL('pl')>PL</button>
<button id=bp-sv class=pb onclick=setL('sv')>SV</button>
</div>
<div class=logo>CYBERDOCTOR</div>
<div class=tag id=tagline>v13b</div>
<div class=wrap>
<div class=ring r1></div>
<div class=ring r2></div>
<div id=orb class=orb onclick=go()><div class=icon id=ic>&#x1F33F;</div></div>
</div>
<div id=status class=status></div>
<div id=hint class=hint></div>
<div class=brand>by CLI</div>
<script>
var pCtx=null,nextT=0,on=false,lang='pl',prov='elevenlabs',stopping=false,stopCooldown=false;
var elConvs={}; // keyed by lang code, supports multiple simultaneous convs

var AGENTS={
  elevenlabs:{en:'agent_4801kksye0h7fwer3stvz64jg64c',pl:'agent_3401kkynw95qfvh9vjt0k1nk71xm',sv:'agent_0101kkyywztkehtbntx2a43b7bna'},
};

var I18N={
  en:{idle:'Tap the orb to talk',idleHint:'Your AI doctor is ready',listening:'Listening...',listeningHint:'Say anything about your health',speaking:'Speaking...',er:'Error'},
  pl:{idle:'Dotknij orba, aby porozmawiać',idleHint:'Twój lekarz AI jest gotowy',listening:'Słucham...',listeningHint:'Powiedz cokolwiek o swoim zdrowiu',speaking:'Mówię...',er:'Błąd'},
  sv:{idle:'Tryck på orben för att prata',idleHint:'Din AI-läkare är redo',listening:'Lyssnar...',listeningHint:'Säg vad som helst om din hälsa',speaking:'Talar...',er:'Fel'},
};

function t(k){return (I18N[lang]||I18N.en)[k]||k;}
function ss(s1,s2,h){document.getElementById('status').innerHTML=s1;document.getElementById('orb').className='orb'+(s2?(' '+s2):'');document.getElementById('hint').innerHTML=h||'';}
function getAudioCtx(){if(!pCtx){pCtx=new(window.AudioContext||window.webkitAudioContext)();nextT=pCtx.currentTime;}}

function setP(p){
  if(on)stop();
  prov=p;
  updateBar();
}
function setL(l){
  if(on)stop();
  lang=l;
  updateBar();
  ss(t('idle'),'',t('idleHint'));
}
function updateBar(){
  ['el','hume','re'].forEach(function(x){document.getElementById('bp-'+x).classList.remove('act');});
  ['en','pl','sv'].forEach(function(x){document.getElementById('bp-'+x).classList.remove('act');});
  var pm={'elevenlabs':'el','hume':'hume','retell':'re'};
  if(pm[prov])document.getElementById('bp-'+pm[prov]).classList.add('act');
  document.getElementById('bp-'+lang).classList.add('act');
}

function go(){if(stopping||stopCooldown)return;or?stop():start();}
function start(){
  if(stopping||stopCooldown)return;
  getAudioCtx();
  on=true;
  if(prov==='hume')startHume();
  else if(prov==='retell')startRetell();
  else startElevenLabs();
}
function stop(){
  if(stopping)return;
  stopping=true;on=false;
  orb.className='orb stopping';
  ic.textContent='\u{1F33F}';
  ss(t('idle'),'',t('idleHint'));
  if(prov==='hume')stopHume();
  else if(prov==='retell')stopRetell();
  else stopElevenLabs();
  setTimeout(function(){stopping=false;stopCooldown=true;setTimeout(function(){stopCooldown=false;},1500);},800);
}

function startOneLang(langCode){
  var aid=AGENTS.elevenlabs[langCode]||ABGENTS.elevenlabs.en;
  ElevenLabs.Conversation.startSession({
    agentId:aid,
    onConnect:function(){if(stopping||!on)return;ic.textContent='\uD83C\uDF99\uFE0F';orb.className='orb on';ss(t('listening'),'on',t('listeningHint'));},
    onDisconnect:function(){
      delete elConvs[langCode];
      if(!stopping&&Object.keys(elConvs).length===0){on=false;orb.className='orb';ic.textContent='\u{1F33F}';ss(t('idle'),'',t('idleHint'));}
    },
    onModeChange:function(m){if(stopping||!on)return;if(m.mode==='speaking'){orb.className='orb sp';ss(t('speaking'),'sp');}else{orb.className='orb on';ss(t('listening'),'on',t('listeningHint'));}},
    onError:function(){orb.className='orb er';ss(t('er'),'er');}
  }).then(function(conv){elConvs[langCode]=conv;}).catch(function(){orb.className='orb er';ss(t('er'),'er');});
}

function startElevenLabs(){
  elConvs={};
  startOneLang(lang);
}

function stopOneLang(langCode){
  var conv=elConvs[langCode];
  if(!conv)return;
  delete elConvs[langCode];
  try{conv.endSession();}catch(e){}
  setTimeout(function(){
    try{
      if(conv._ws){try{conv._ws.close();}catch(e){}}
      if(conv._pc){try{conv._pc.close();}catch(e){}}
      if(conv._pc&&conv._pc.getSenders){conv._pc.getSenders().forEach(function(s){try{if(s.track)s.track.stop();}catch(e){}});}
    }catch(e){}
  },100);
}

function stopElevenLabs(){
  var keys=Object.keys(elConvs);
  keys.forEach(function(k){stopOneLang(k){});
  elConvs={};
}

function startRetell(){ss(t('listening'),'on',t('listeningHint'));}
function stopRetell(){}
function startHume(){
  getAudioCtx();
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    var ws=new WebSocket('wss://api.hume.ai/v0/converse/prepare?auth-key=HVq3u5nqTg5eK2sL4mN7pR0vW8xY1zA9bC6dE2fG3hI4jK5lM7nO8pQ9rS0tU1vW2xY3zA4bC5dE6fG7hI4jK9lM0nP1qR2sT3uV4wX5yZ6');
    ws.onopen=function(){ic.textContent='\uD83C\uDF99\uFE0F';orb.className='orb on';ss(t('listening'),'on');};
    ws.onmessage=function(e){
      var ab=new Uint8Array(e.data);
      pCtx.decodeAudioData(ab,function(buf){
        var src=pCtx.createBufferSource();src.buffer=buf;
        var now=pCtx.currentTime;
        if(nextT<now-0.3||nextT>now+2.0)nextT=now+0.4;
        src.start(nextT);nextT+=buf.duration;
      });
    };
    ws.onerror=function(){ss(t('er'),'er');};
  });
}
function stopHume(){}

var orb=document.getElementById('orb');
var ic=document.getElementById('ic');
updateBar();
ss(t('idle'),'',t('idleHint'));
</script>
</body>
</html>

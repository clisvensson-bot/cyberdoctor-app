<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CYBERDOCTOR</title>
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CYBERDOCTOR">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a1a,#0d1b2a);color:#e3f2fd;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;-webkit-tap-highlight-color:transparent}
.logo{font-size:2.2rem;font-weight:700;letter-spacing:.18em;color:#4fc3f7;margin-bottom:6px}
.tag{font-size:.8rem;color:#455a64;margin-bottom:40px;letter-spacing:.06em;text-transform:uppercase}
.wrap{position:relative;margin-bottom:30px}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(79,195,247,.15);animation:rp 3s ease-in-out infinite}
.r1{inset:-12px}.r2{inset:-24px;border-color:rgba(79,195,247,.07);animation-delay:.5s}
@keyframes rp{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}
.orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#162540,#0a0f1a);border:2px solid #1e3a5f;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .35s;position:relative;box-shadow:0 0 25px rgba(79,195,247,.08),inset 0 0 25px rgba(0,0,0,.5);user-select:none;-webkit-user-select:none}
.orb:active{transform:scale(.93)}
.orb.on{color:#4fc3f7;box-shadow:0 0 50px rgba(79,195,247,.35);animation:op 1.8s ease-in-out infinite}
.orb.sp{border-color:#81c784;box-shadow:0 0 50px rgba(129,199,132,.35);animation:op .9s ease-in-out infinite}
@keyframes op{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.icon{font-size:2.8rem}
.status{font-size:1rem;color:#78909c;margin-bottom:8px;min-height:26px;font-weight:500}
.status.on{color:#4fc3f7}.status.sp{color:#81c784}.status.er{color:#ef9a9a}
.hint{font-size:.75rem;color:#2e4057;min-height:18px;margin-bottom:16px}
.brand{margin-top:12px;font-size:.6rem;color:#1c2b38;letter-spacing:.12em;text-transform:uppercase}
</style>
</head>
<body>
<div class="logo">CYBERDOCTOR</div>
<div class="tag">Holistic &amp; Quantum Medicine AI &middot; Dialadoctor.global</div>
<div class="wrap">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="orb" id="orb" onclick="go()"><span class="icon" id="ic">&#127807;</span></div>
</div>
<div class="status" id="st">Tap the orb to begin</div>
<div class="hint" id="ht">Natural remedies &middot; Herbal medicine &middot; Quantum healing</div>
<div class="brand">Dialadoctor.global &middot; Hume EVI</div>
<script>
var C="fdd212af-9c46-4396-806e-dac64d005682";
var K="PlTB4AADM5ISBlH8NG1a4NayxFLBHUBoMLxImRzG3g9AAV9b;
var sock=null,stream=null,actx=null,proc=null,pCtx=null,acResT=null;
var on=false;
var nextT=0;
var queue=[],decoding=false;
var orb=document.getElementById("orb");
var ic=document.getElementById("ic");
var st=document.getElementById("st");
var ht=document.getElementById("ht");
function ss(m,c,h){st.textContent=m;st.className="status"+(c?" "+c:"");if(h!==undefined)ht.textContent=h;}
function go(){on?stop():start();}
function initPlayCtx(){
  if(!pCtx||pCtx.state==="closed"){pCtx=new(window.AudioContext||window.webkitAudioContext)();nextT=0;}
  if(pCtx.state==="suspended")pCtx.resume();
  return pCtx;
}
function enqueue(b64){queue.push(b64);drain();}
function drain(){
  if(decoding||queue.length===0)return;
  var b64=queue.shift();decoding=true;
  var ctx=initPlayCtx();
  var bin=atob(b64);var ab=new ArrayBuffer(bin.length);var u8=new Uint8Array(ab);
  for(var i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
  ctx.decodeAudioData(ab.slice(0),function(buf){play(buf);decoding=false;drain();},function(){
    try{var s16=new Int16Array(ab);var f32=new Float32Array(s16.length);
    for(var i=0;i<s16.length;i++)f32[i]=s16[i]/32768;
    var b=ctx.createBuffer(1,f32.length,24000);b.copyToChannel(f32,0);play(b);}catch(e){}
    decoding=false;drain();
  });
}
function play(buf){
  var ctx=initPlayCtx();var now=ctx.currentTime;
  if(nextT<now||nextT>now+8)nextT=now;
  var src=ctx.createBufferSource();src.buffer=buf;src.connect(ctx.destination);src.start(nextT);nextT+=buf.duration;
}
function start(){
  ss("Connecting...","","Please wait...");queue=[];decoding=false;nextT=0;initPlayCtx();
  try{
    sock=new WebSocket("wss://api.hume.ai/v0/evi/chat?config_id="+C+"&api_key="+K);
    sock.onopen=function(){
      on=true;orb.className="orb on";ic.textContent="\uD83C\uDF99\uFE0F";
      ss("Listening \u2014 speak freely","on","Ask about herbs, remedies, quantum healing");
      sock.send(JSON.stringify({type:"session_settings",audio:{encoding:"linear16",sample_rate:16000,channels:1}}));
      startMic();
      acResT=setInterval(function(){
        if(pCtx&&pCtx.state==="suspended")try{pCtx.resume();}catch(e){}
        if(actx&&actx.state==="suspended")try{actx.resume();}catch(e){}
      },8000);
    };
    sock.onmessage=function(e){
      try{
        var m=JSON.parse(e.data);
        if(m.type==="audio_output"&&m.data){orb.className="orb sp";ic.textContent="\uD83D\uDC04";s("Speaking...","sp","");enqueue(m.data);}
        if(m.type==="user_message"){queue=[];decoding=false;orb.className="orb on";ic.textContent="\uD83C\uDF99\uFE0F";s("Listening...","on","");nextT=0;}
        if(m.type==="assistant_end"){setTimeout(function(){if(on&&pCtx&&nextT<=pCtx.currentTime+0.2){orb.className="orb on";ic.textContent="\uD83C\uDF99\uFE0F";ss("Listening \u2014 speak freely","on","Ask about herbs, remedies, quantum healing");}},Math.max(0,(nextT-(pCtx?pCtx.currentTime:0))*1000+300));}
        if(m.type==="error"){s("Error: "+(m.message||"unknown")+" \u2014 tap to retry","er","");stop();}
      }catch(x){}
    };
    sock.onerror=function(){s("Connection error \u2014 tap to retry","er","");stop();};
    sock.onclose=function(ev){if(on){ss("Session ended ("+ev.code+") \u2014 tap to restart","er","");stop();}};
  }catch(e){ss("Error: "+e.message,"er","Tap to retry");}
}
function startMic(){
  navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true,autoGainControl:true}})
  .then(function(s){
    stream=s;
    try{actx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});}catch(ex){actx=new(window.AudioContext||window.webkitAudioContext)();}
    try{actx.resume();}catch(ex){}
    var src=actx.createMediaStreamSource(s);
    proc=actx.createScriptProcessor(4096,1,1);
    var ratio=Math.max(1,Math.round(actx.sampleRate/16000));
    proc.onaudioprocess=function(ev){
      if(!sock||sock.readyState!==1)return;
      if(actx.state==="suspended")try{actx.resume();}catch(ex){}
      var d=ev.inputBuffer.getChannelData(0);
      var out=ratio===1?d:[];
      if(ratio!==1)for(var i=0;i<d.length;i+=ratio)out.push(d[i]);
      var p=new Int16Array(out.length||d.length);var src2=ratio===1?d:out;
      for(var i=0;i<p.length;i++)p[i]=Math.max(-32768,Math.min(32767,(src2[i]||0)*32767));
      var b=new Uint8Array(p.buffer),s2="";
      for(var j=0;j<b.byteLength;j++)s2+=String.fromCharCode(b[j]);
      try{sock.send(JSON.stringify({type:"audio_input",data:btoa(s2)}));}catch(ex){}
    };
    src.connect(proc);proc.connect(actx.destination);
  }).catch(function(){ss("Microphone needed","er","Allow mic in browser settings");});
}
function stop(){
  on=false;clearInterval(acResT);acResT=null;queue=[];decoding=false;nextT=0;
  orb.className="orb";ic.textContent="\uD83C\uDF3F";
  ss("Tap the orb to begin","","Natural remedies \u00B7 Herbal medicine \u00B7 Quantum healing");
  if(proc){try{proc.disconnect();}catch(e){}proc=null;}
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  if(actx){try{actx.close();}catch(e){}actx=null;}
  if(pCtx){try{pCtx.close();}catch(e){}pCtx=null;}
  if(sock){try{sock.close();}catch(e){}sock=null;}
}
document.addEventListener("visibilitychange",function(){
  if(!document.hidden&&on){
    if(pCtx&&pCtx.state==="suspended")try{pCtx.resume();}catch(e){}
    if(actx&&actx.state==="suspended")try{actx.resume();}catch(e){}
  }
});
</script>
</body>
</html>

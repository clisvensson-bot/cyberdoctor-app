<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CYBERDOCTOR</title>
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CYBERDOCTOR">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a1a,#0d1b2a);color:#e3f2fd;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;-webkit-tap-highlight-color:transparent}
#pbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;gap:8px;padding:10px 16px;background:rgba(10,10,26,.95);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid #1a1a3a}
.pb{padding:6px 20px;border-radius:20px;border:1px solid #2a2a4a;background:transparent;color:#556;cursor:pointer;font-size:12px;letter-spacing:.05em;transition:all .2s;font-weight:500}
.pb.act{background:#1a2a4a;border-color:#3399ff;color:#7ec8ff}
.logo{font-size:2.2rem;font-weight:700;letter-spacing:.18em;color:#4fc3f7;margin-bottom:6px;margin-top:52px}
.tag{font-size:.8rem;color:#455a64;margin-bottom:40px;letter-spacing:.06em;text-transform:uppercase}
.wrap{position:relative;margin-bottom:30px}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(79,195,247,.15);animation:rp 3s ease-in-out infinite}
.r1{inset:-12px}.r2{inset:-24px;border-color:rgba(79,195,247,.07);animation-delay:.5s}
@keyframes rp{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}
.orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#162540,#0a0f1a);border:2px solid #1e3a5f;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .35s;position:relative;box-shadow:0 0 25px rgba(79,195,247,.08),inset 0 0 25px rgba(0,0,0,.5);user-select:none;-webkit-user-select:none}
.orb:active{transform:scale(.93)}
.orb.on{color:#4fc3f7;box-shadow:0 0 50px rgba(79,195,247,.35);animation:op 1.8s ease-in-out infinite}
.orb.sp{border-color:#81c784;box-shadow:0 0 50px rgba(129,199,132,.35);animation:op .9s ease-in-out infinite}
@keyframes op{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.icon{font-size:2.8rem}
.status{font-size:1rem;color:#78909c;margin-bottom:8px;min-height:26px;font-weight:500}
.status.on{color:#4fc3f7}.status.sp{color:#81c784}.status.er{color:#ef9a9a}
.hint{font-size:.75rem;color:#2e4057;min-height:18px;margin-bottom:16px}
.brand{margin-top:12px;font-size:.6rem;color:#1c2b38;letter-spacing:.12em;text-transform:uppercase}
</style>
</head>
<body>
<div id="pbar">
  <button class="pb" id="pb-hume" onclick="switchP('hume')">Hume EVI</button>
  <button class="pb act" id="pb-elevenlabs" onclick="switchP('elevenlabs')">ElevenLabs</button>
  <button class="pb" id="pb-retell" onclick="switchP('retell')">Retell AI</button>
</div>
<div class="logo">CYBERDOCTOR</div>
<div class="tag">Holistic &amp; Quantum Medicine AI &middot; Dialadoctor.global</div>
<div class="wrap">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="orb" id="orb" onclick="go()"><span class="icon" id="ic">&#127807;</span></div>
</div>
<div class="status" id="st">Tap the orb to begin</div>
<div class="hint" id="ht">Natural remedies &middot; Herbal medicine &middot; Quantum healing</div>
<div class="brand">Dialadoctor.global &middot; <span id="pname">ElevenLabs</span></div>

<audio id="spkr" playsinline autoplay style="display:none"></audio>
<audio id="silent" playsinline style="display:none"></audio>

// ── LOUDSPEAKER UNLOCK ─────────────────────────────────────────────────────
function unlockSpeaker(){
  var s=document.getElementById('silent');
  s.src='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
  s.volume=0.001;
  s.play().catch(function(){});
}

// ── PROVIDER SWITCH ─────────────────────────────────────────────────────────
function switchP(p){
  if(on) stop();
  prov=p;
  document.querySelectorAll('.pb').forEach(function(b){b.classList.remove('act');});
  document.getElementById('pb-'+p).classList.add('act');
  pname.textContent = p==='hume' ? 'Hume EVI' : p==='retell' ? 'Retell AI' : 'ElevenLabs';
  ss('Tap the orb to begin','','Natural remedies \u00B7 Herbal medicine \u00B7 Quantum healing');
  orb.className='orb'; ic.textContent='\u{1F33F}';
}

function go(){on?stop():start();}

function start(){
  unlockSpeaker();
  if(prov==='hume') startHume();
  else if(prov==='retell') startRetell();
  else startElevenLabs();
}

function stop(){
  on=false;
  orb.className='orb'; ic.textContent='\u{1F33F}';
  ss('Tap the orb to begin','','Natural remedies \u00B7 Herbal medicine \u00B7 Quantum healing');
  if(prov==='hume') stopHume();
  else if(prov==='retell') stopRetell();
  else stopElevenLabs();
}
